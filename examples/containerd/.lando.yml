name: lando-containerd
services:
  web:
    api: 3
    type: lando
    services:
      image: nginx:1.22.1
      command: /docker-entrypoint.sh nginx -g "daemon off;"
      ports:
        - 0:80
      volumes:
        - ./:/usr/share/nginx/html
  web2:
    api: 4
    type: lando
    image: nginxinc/nginx-unprivileged:1.26.1
    ports:
      - 8080/http
    app-mount:
      destination: /usr/share/nginx/html

plugins:
  "@lando/core": ../..
